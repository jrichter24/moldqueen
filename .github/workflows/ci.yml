name: CI

# Test gate for the 0.1 release — Python, Android, and JS/static checks on free
# GitHub-hosted runners (public repo). NO signing or secrets here: this is the test
# gate only. Signing + release artifacts come as a separate release workflow later.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # ── Python (linux-core): pytest + the codec self-test (regression gate) ──────
  python:
    name: Python (linux-core)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linux-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: linux-core/requirements.txt
      - name: Install deps
        run: pip install -r requirements.txt
      - name: pytest
        run: pytest
      - name: Crypt self-test (codec regression gate — exits non-zero on a vector failure)
        run: python mk4web/mouldking_crypt.py

  # ── Android (android-core): unit tests + an UNSIGNED release build ───────────
  # The unsigned assembleRelease proves a clean-machine release build works (the
  # F-Droid from-source scenario). bundleClient copies the ../client + ../linux-core
  # siblings, so the FULL monorepo must be checked out (default checkout — not sparse).
  android:
    name: Android (android-core)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Android SDK (platform-35 + build-tools 35.0.0)
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'
      - name: Set up Gradle (caches deps + the wrapper distribution)
        uses: gradle/actions/setup-gradle@v4
      - name: Make gradlew executable (repo committed it 100644)
        run: chmod +x gradlew
      - name: Unit tests (codec-parity gate)
        run: ./gradlew testDebugUnitTest --stacktrace
      - name: Unsigned release build (clean-machine / F-Droid from-source scenario)
        run: ./gradlew assembleRelease --stacktrace
      - name: Upload unsigned release APK
        uses: actions/upload-artifact@v4
        with:
          name: moldqueen-release-unsigned-apk
          path: android-core/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error

  # ── JS / static (client + docs): JSON validity + JS syntax ──────────────────
  js:
    name: JS / static (client + docs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate JSON (layouts.json + the 5 channel_map.*.json)
        run: |
          set -e
          for f in client/web/layouts.json client/web/channel_map.*.json; do
            echo "checking $f"
            FILE="$f" node -e 'JSON.parse(require("fs").readFileSync(process.env.FILE,"utf8"))'
          done
      - name: JS syntax check (node --check on client/web/*.js + docs/site.js)
        run: |
          set -e
          for f in client/web/*.js docs/site.js; do
            echo "checking $f"
            node --check "$f"
          done
