asyncapi: 3.0.0

info:
  title: moldqueen MK4 control WebSocket API
  version: 1.0.0
  description: |
    WebSocket control API for the Mould King 13112 excavator (MK4 12-channel
    nibble protocol). This API is the product; the bundled web page is one client.

    ## Lifecycle (server-owned, GUI-driven)
    `IDLE` (radio off) → `CONNECTING` (broadcasting the MK4 connect telegram) →
    `READY` (broadcasting motion; controls active). The service cannot see the
    hubs' LED flashes, so the operator drives the transitions:
    `setup connect` → button one hub to a second slot → `setup ready`.
    **Motion (`set`) is honored ONLY in `READY`.**

    ## Control model — 3 slots × 4 channels (12 nibbles)
    One telegram drives all hubs at once. A hub obeys the nibble block of the
    **slot** selected by its physical button (resets to slot 0 on power-cycle):
    slot 0 = channels 0–3, slot 1 = 4–7, slot 2 = 8–11.

    ## Channel map — control by FUNCTION
    Raw `set` addresses a slot/channel directly. `drive` addresses a **function**
    (`left_track`, `right_track`, `arm_lift`, `front_arm`, `rotation`, `bucket`)
    which the **server** resolves to (slot, channel, value) via a channel map. The
    map has a persisted **default** (`config/channel_map.json`) and a session
    **active** map (default + client overrides) the client pushes with `map set`.
    Per function: `{slot 0-2, channel 0-3, invert, label_en, label_de}`. A
    session-only **device-0/1 swap** flips slots 0↔1 (slot 2 untouched). `map
    promote` persists a map as the new default. The broadcaster stays dumb (it
    only ever receives 12 nibbles).

    ## value → nibble mapping
    `nibble = 0x8 + value`, value in `-7..+7` → nibble `0x1..0xF`:
    `0` = `0x8` neutral/stop, `+7` = `0xF` (one direction), `-7` = `0x1` (the other).
    State is reported back as the signed `value` (`-7..+7`), not the raw nibble.

    ## Safety
    On any client disconnect (or no clients), the server commands NEUTRAL. If the
    API process itself dies, the broadcaster reverts to IDLE (advertising off).

servers:
  default:
    host: '{host}:{port}'
    protocol: ws
    description: WebSocket endpoint (defaults; configurable via MK4_HOST / MK4_WS_PORT).
    variables:
      host:
        default: localhost
        description: Pi host/IP.
      port:
        default: '8765'
        description: WebSocket port (config.WS_PORT).

channels:
  control:
    address: /
    description: |
      The single control channel. A client connects, immediately receives the
      current `lifecycle` then `state`, then exchanges the messages below.
    messages:
      set: { $ref: '#/components/messages/Set' }
      drive: { $ref: '#/components/messages/Drive' }
      stop: { $ref: '#/components/messages/Stop' }
      stateRequest: { $ref: '#/components/messages/StateRequest' }
      setup: { $ref: '#/components/messages/Setup' }
      mapCommand: { $ref: '#/components/messages/MapCommand' }
      infoRequest: { $ref: '#/components/messages/InfoRequest' }
      lifecycle: { $ref: '#/components/messages/Lifecycle' }
      state: { $ref: '#/components/messages/State' }
      map: { $ref: '#/components/messages/Map' }
      mapResult: { $ref: '#/components/messages/MapResult' }
      info: { $ref: '#/components/messages/Info' }

operations:
  receiveCommands:
    action: receive
    channel: { $ref: '#/channels/control' }
    summary: Commands the server receives from a client.
    messages:
      - { $ref: '#/channels/control/messages/setup' }
      - { $ref: '#/channels/control/messages/set' }
      - { $ref: '#/channels/control/messages/drive' }
      - { $ref: '#/channels/control/messages/stop' }
      - { $ref: '#/channels/control/messages/stateRequest' }
      - { $ref: '#/channels/control/messages/mapCommand' }
      - { $ref: '#/channels/control/messages/infoRequest' }

  sendUpdates:
    action: send
    channel: { $ref: '#/channels/control' }
    summary: |
      Updates the server sends to clients. On connect it sends `lifecycle` then
      `state`. `lifecycle` is pushed on every transition; `state` is pushed after
      every `set`/`stop`/`setup` and on disconnect (broadcast to all clients). A
      `state` query is answered to the requesting client only.
    messages:
      - { $ref: '#/channels/control/messages/lifecycle' }
      - { $ref: '#/channels/control/messages/state' }
      - { $ref: '#/channels/control/messages/map' }
      - { $ref: '#/channels/control/messages/mapResult' }
      - { $ref: '#/channels/control/messages/info' }

components:
  messages:
    Set:
      name: set
      title: Set channel value (motion)
      summary: Drive one channel directly. Honored ONLY when lifecycle is READY; ignored otherwise.
      payload: { $ref: '#/components/schemas/SetPayload' }
    Drive:
      name: drive
      title: Drive a function (motion)
      summary: |
        Drive a named function; the server resolves it to (slot, channel, value)
        via the active channel map (applying invert + device swap). READY-only.
      payload: { $ref: '#/components/schemas/DrivePayload' }
    MapCommand:
      name: map
      title: Channel-map command
      summary: 'get | set (session active map) | swap (device 0/1) | promote (persist default).'
      payload: { $ref: '#/components/schemas/MapCommandPayload' }
    Map:
      name: map
      title: Channel map (server → client)
      summary: Current default + active maps and the session device-swap flag. Sent on connect and after any map change.
      payload: { $ref: '#/components/schemas/MapPayload' }
    MapResult:
      name: mapresult
      title: Map command result (server → requester)
      summary: Validation result of a set/promote (ok + any errors). Sent to the requesting client.
      payload: { $ref: '#/components/schemas/MapResultPayload' }
    Stop:
      name: stop
      title: Stop (all neutral)
      summary: Set all 12 nibbles to neutral. Accepted in any lifecycle state.
      payload: { $ref: '#/components/schemas/StopPayload' }
    StateRequest:
      name: state
      title: Request current state
      summary: Ask the server to (re)send the current lifecycle + state to this client.
      payload: { $ref: '#/components/schemas/StateRequestPayload' }
    InfoRequest:
      name: info
      title: Request server info
      summary: Ask for server-info. Answered to the requesting client only with an Info message.
      payload: { $ref: '#/components/schemas/InfoRequestPayload' }
    Info:
      name: info
      title: Server info (server → requester)
      summary: |
        Server-info disclosure over the mandatory WS channel (works in --ws-only/
        headless). Fields depend on the server's tier (MK4_INFO_LEVEL / --info-level),
        which is always echoed as `info_level`:
        - safe:  app, version, lifecycle, info_level (minimal, nothing identifying).
        - light (DEFAULT): + radio_backend, dry_run, hci, ws_port, http_port, serve_client (NO MAC).
        - debug: + adapter_mac, hostname, bluetoothd, host_bind, paths.
      payload: { $ref: '#/components/schemas/InfoPayload' }
    Setup:
      name: setup
      title: Drive the connection lifecycle
      summary: 'connect → CONNECTING, ready → READY, reset → IDLE (also forces neutral).'
      payload: { $ref: '#/components/schemas/SetupPayload' }
    Lifecycle:
      name: lifecycle
      title: Lifecycle state (server → client)
      summary: Current connection lifecycle. Sent on connect and on every transition.
      payload: { $ref: '#/components/schemas/LifecyclePayload' }
    State:
      name: state
      title: Control state (server → client)
      summary: Current per-channel values as a 3×4 grid of signed values (-7..7).
      payload: { $ref: '#/components/schemas/StatePayload' }

  schemas:
    SetPayload:
      type: object
      additionalProperties: false
      required: [cmd, slot, channel, value]
      properties:
        cmd:     { type: string, const: set }
        slot:    { type: integer, minimum: 0, maximum: 2, description: '0 = ch0-3, 1 = ch4-7, 2 = ch8-11.' }
        channel: { type: integer, minimum: 0, maximum: 3 }
        value:   { type: integer, minimum: -7, maximum: 7, description: 'nibble = 0x8 + value.' }
      examples:
        - { cmd: set, slot: 1, channel: 0, value: 5 }

    DrivePayload:
      type: object
      additionalProperties: false
      required: [cmd, function, value]
      properties:
        cmd:      { type: string, const: drive }
        function: { type: string, enum: [left_track, right_track, arm_lift, front_arm, rotation, bucket] }
        value:    { type: integer, minimum: -7, maximum: 7, description: 'Pre-invert signed speed; release sends 0.' }
      examples:
        - { cmd: drive, function: left_track, value: 6 }
        - { cmd: drive, function: bucket, value: 0 }

    StopPayload:
      type: object
      additionalProperties: false
      required: [cmd]
      properties:
        cmd: { type: string, const: stop }
      examples:
        - { cmd: stop }

    FunctionAssignment:
      type: object
      required: [slot, channel, invert, label_en, label_de]
      properties:
        slot:      { type: integer, minimum: 0, maximum: 2 }
        channel:   { type: integer, minimum: 0, maximum: 3 }
        invert:    { type: boolean }
        max:       { type: integer, minimum: 1, maximum: 7, description: 'Per-function max speed; the joystick full-deflection value. Client-side scaling; persisted with the map.' }
        reverse_scale: { type: number, minimum: 0.25, maximum: 4.0, description: 'Reverse-speed trim (default 1.0 = identity). Multiplies the reverse magnitude at resolution to match forward speed (hub/motor asymmetry, not the byte mapping).' }
        label_en:  { type: string }
        label_de:  { type: string }
        confirmed: { type: boolean, description: 'UI metadata: verified vs placeholder.' }

    ChannelMap:
      type: object
      required: [functions]
      properties:
        version: { type: integer }
        functions:
          type: object
          description: 'Exactly the six functions; no duplicate (slot, channel) pairs.'
          required: [left_track, right_track, arm_lift, front_arm, rotation, bucket]
          additionalProperties: false
          properties:
            left_track:  { $ref: '#/components/schemas/FunctionAssignment' }
            right_track: { $ref: '#/components/schemas/FunctionAssignment' }
            arm_lift:    { $ref: '#/components/schemas/FunctionAssignment' }
            front_arm:   { $ref: '#/components/schemas/FunctionAssignment' }
            rotation:    { $ref: '#/components/schemas/FunctionAssignment' }
            bucket:      { $ref: '#/components/schemas/FunctionAssignment' }

    MapCommandPayload:
      type: object
      additionalProperties: false
      required: [cmd, action]
      properties:
        cmd:    { type: string, const: map }
        action: { type: string, enum: [get, set, swap, promote] }
        map:    { $ref: '#/components/schemas/ChannelMap' }
        value:  { type: boolean, description: 'For action=swap: device-0/1 swap on/off.' }
      examples:
        - { cmd: map, action: get }
        - { cmd: map, action: swap, value: true }

    MapPayload:
      type: object
      additionalProperties: false
      required: [type, default, active, device_swap]
      properties:
        type:        { type: string, const: map }
        default:     { $ref: '#/components/schemas/ChannelMap' }
        active:      { $ref: '#/components/schemas/ChannelMap' }
        device_swap: { type: boolean }

    MapResultPayload:
      type: object
      additionalProperties: false
      required: [type, action, ok, errors]
      properties:
        type:   { type: string, const: mapresult }
        action: { type: string, enum: [set, promote] }
        ok:     { type: boolean }
        errors: { type: array, items: { type: string } }
      examples:
        - { type: mapresult, action: promote, ok: true, errors: [] }

    StateRequestPayload:
      type: object
      additionalProperties: false
      required: [cmd]
      properties:
        cmd: { type: string, const: state }
      examples:
        - { cmd: state }

    InfoRequestPayload:
      type: object
      additionalProperties: false
      required: [cmd]
      properties:
        cmd: { type: string, const: info }
      examples:
        - { cmd: info }

    InfoPayload:
      type: object
      description: |
        Tiered server-info. Only `type`, `app`, `version`, `lifecycle`, `info_level`
        are always present (the "safe" tier). The `light` and `debug` fields appear
        only at those tiers — hence not "required" here.
      required: [type, app, version, lifecycle, info_level]
      properties:
        type:          { type: string, const: info }
        app:           { type: string, const: moldqueen }
        version:       { type: string, description: 'Server version (config.VERSION).' }
        lifecycle:     { type: string, enum: [IDLE, CONNECTING, READY] }
        info_level:    { type: string, enum: [safe, light, debug], description: 'The active disclosure tier.' }
        # --- light tier (and debug) ---
        radio_backend: { type: string, enum: [rawhci, hcitool], description: 'light+ — active radio backend (default rawhci).' }
        dry_run:       { type: boolean, description: 'light+ — configured dry-run intent (no transmit).' }
        hci:           { type: string, description: 'light+ — HCI adapter index, e.g. "hci1" (NO MAC).' }
        ws_port:       { type: integer, description: 'light+' }
        http_port:     { type: integer, description: 'light+' }
        serve_client:  { type: boolean, description: 'light+ — whether the API also serves the web page.' }
        # --- debug tier only (identifying) ---
        adapter_mac:   { type: [string, 'null'], description: 'debug — adapter BD address (may be null).' }
        hostname:      { type: string, description: 'debug — server hostname.' }
        bluetoothd:    { type: [string, 'null'], description: 'debug — systemctl is-active bluetooth.' }
        host_bind:     { type: string, description: 'debug — bind address (MK4_HOST).' }
        paths:         { type: object, description: 'debug — socket / channel-map / assets / web paths.' }
      examples:
        - { type: info, app: moldqueen, version: '0.1.0', lifecycle: IDLE, info_level: safe }
        - { type: info, app: moldqueen, version: '0.1.0', lifecycle: READY, info_level: light,
            radio_backend: rawhci, dry_run: false, hci: hci1, ws_port: 8765, http_port: 8080, serve_client: true }

    SetupPayload:
      type: object
      additionalProperties: false
      required: [cmd, action]
      properties:
        cmd:    { type: string, const: setup }
        action: { type: string, enum: [connect, ready, reset] }
      examples:
        - { cmd: setup, action: connect }
        - { cmd: setup, action: ready }
        - { cmd: setup, action: reset }

    LifecyclePayload:
      type: object
      additionalProperties: false
      required: [type, state]
      properties:
        type:  { type: string, const: lifecycle }
        state: { type: string, enum: [IDLE, CONNECTING, READY] }
      examples:
        - { type: lifecycle, state: READY }

    StatePayload:
      type: object
      additionalProperties: false
      required: [type, slots]
      properties:
        type: { type: string, const: state }
        slots:
          type: array
          description: '3 slots × 4 channels of current signed values (-7..7). slots[slot][channel].'
          minItems: 3
          maxItems: 3
          items:
            type: array
            minItems: 4
            maxItems: 4
            items: { type: integer, minimum: -7, maximum: 7 }
      examples:
        - { type: state, slots: [[0, 0, 0, 0], [5, 0, 0, 0], [0, 0, 0, 0]] }
