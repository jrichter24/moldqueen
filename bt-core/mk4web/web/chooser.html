<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>moldqueen — choose a layout</title>
  <link rel="icon" href="/assets/moldqueen_icon.png" />
  <script>
    // Skip straight to the remembered layout (unless ?choose forces the chooser).
    (function () {
      var force = new URLSearchParams(location.search).has("choose");
      var stored = localStorage.getItem("mk4_layout");
      var routes = { excavator: "/dashboard", raw: "/raw" };
      if (!force && stored && routes[stored]) location.replace(routes[stored]);
    })();
  </script>
  <style>
    :root { color-scheme: dark; --glow: #4aa3ff; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: #05070b; color: #e8eef6; font-family: system-ui, -apple-system, sans-serif;
      min-height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: clamp(1rem, 3vh, 2rem); padding: 4vh 4vw; -webkit-user-select: none; user-select: none;
      background-image: url("/assets/moldqueen_banner.png");
      background-size: cover; background-position: center; background-attachment: fixed;
    }
    body::before { content: ""; position: fixed; inset: 0; z-index: 0;     /* dim the banner so cards stay readable */
      background: radial-gradient(120% 90% at 50% 30%, rgba(5,7,11,.55), rgba(5,7,11,.88)); }
    .wrap { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center;
            gap: clamp(1rem, 3vh, 2rem); width: 100%; max-width: 860px; }
    header { display: flex; align-items: center; gap: .7rem; text-align: center; }
    header img { width: clamp(34px, 7vw, 54px); height: auto; filter: drop-shadow(0 2px 8px rgba(0,0,0,.6)); }
    header h1 { margin: 0; font-size: clamp(1.2rem, 4vw, 1.9rem); font-weight: 800; letter-spacing: .04em;
                text-shadow: 0 2px 12px rgba(0,0,0,.7); }
    header .sub { display: block; font-size: clamp(.72rem, 2vw, .9rem); font-weight: 500; color: #9fb2cc; letter-spacing: .02em; }
    .cards { display: flex; gap: clamp(1rem, 3vw, 1.8rem); flex-wrap: wrap; justify-content: center; width: 100%; }
    .card {
      flex: 1 1 260px; max-width: 320px; min-width: 220px;
      display: flex; flex-direction: column; cursor: pointer; color: inherit; font: inherit; text-align: left;
      background: linear-gradient(180deg, rgba(22,28,38,.92), rgba(13,17,24,.96));
      border: 1px solid #2b3647; border-radius: 1rem; overflow: hidden; padding: 0;
      box-shadow: 0 10px 30px rgba(0,0,0,.5);
      transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease;
    }
    .card:hover, .card:focus-visible {
      transform: translateY(-4px); border-color: var(--glow); outline: none;
      box-shadow: 0 0 0 1px var(--glow), 0 0 26px rgba(74,163,255,.45), 0 14px 36px rgba(0,0,0,.6);
    }
    .card .art {
      height: clamp(130px, 26vh, 200px); display: flex; align-items: center; justify-content: center;
      background: radial-gradient(80% 80% at 50% 40%, rgba(74,120,180,.18), rgba(10,14,20,.2));
      border-bottom: 1px solid #232d3c;
    }
    .card .art img { width: 64%; height: 78%; object-fit: contain; filter: drop-shadow(0 4px 14px rgba(0,0,0,.55)); }
    .card .art svg { width: 46%; height: 60%; color: #bcd4f2; filter: drop-shadow(0 4px 14px rgba(0,0,0,.5)); }
    .card .body { padding: .9rem 1.1rem 1.1rem; display: flex; flex-direction: column; gap: .35rem; }
    .card h2 { margin: 0; font-size: 1.12rem; font-weight: 800; letter-spacing: .05em; text-transform: uppercase; }
    .card .desc { color: #9fb2cc; font-size: .9rem; line-height: 1.35; }
    .card .go { margin-top: .3rem; font-size: .76rem; color: #6f8aa8; letter-spacing: .08em; text-transform: uppercase; }
    footer { position: relative; z-index: 1; color: #5d6b82; font-size: .75rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <img src="/assets/moldqueen_icon.png" alt="" />
      <h1>moldqueen<span class="sub">Choose a layout — remembered for next time</span></h1>
    </header>
    <div class="cards">
      <button class="card" data-layout="excavator" data-route="/dashboard">
        <div class="art"><img src="/assets/excavator_icon.png" alt="" /></div>
        <div class="body">
          <h2>Excavator (13112)</h2>
          <div class="desc">Drive the excavator — full dashboard.</div>
          <div class="go">Open ▸</div>
        </div>
      </button>
      <button class="card" data-layout="raw" data-route="/raw">
        <div class="art">
          <!-- generic tool/debug glyph (wrench + terminal); our own art, no external -->
          <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3.2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="6" y="12" width="52" height="40" rx="4"></rect>
            <path d="M15 24l7 6-7 6"></path>
            <path d="M30 38h12"></path>
            <path d="M50 16l-3.5 3.5a5 5 0 0 0 6.5 6.5L56 22" stroke-width="2.4"></path>
          </svg>
        </div>
        <div class="body">
          <h2>RAW (Debug)</h2>
          <div class="desc">Low-level telegram test bench.</div>
          <div class="go">Open ▸</div>
        </div>
      </button>
    </div>
  </div>
  <footer>Layouts are pluggable — more toys later.</footer>
  <script>
    document.querySelectorAll(".card").forEach(function (c) {
      c.addEventListener("click", function () {
        localStorage.setItem("mk4_layout", c.dataset.layout);
        location.href = c.dataset.route;
      });
    });
  </script>
</body>
</html>
