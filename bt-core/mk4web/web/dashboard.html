<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>moldqueen — dashboard</title>
  <link rel="stylesheet" href="/dashboard.css" />
  <script>window.MK4_WS_PORT = __WS_PORT__; window.MK4_INIT = __INIT__;</script>
</head>
<body>
  <!-- Viewport-sized shell: a menu STRIP (top bar on wide screens, left sidebar on
       small ones) + a dashboard AREA. The stage scales to fit the area (contain),
       preserving the percent-coordinate control positioning. No page scrolling. -->
  <div id="app">
    <nav id="menu"></nav>                     <!-- toolbar; built by dashboard.js -->
    <div id="stagewrap">
      <div id="stage">
        <img id="bg" src="/assets/moldqueen_dashboard.png" alt="" draggable="false" />
        <div id="overlay"></div>              <!-- hotspots + joysticks + titles + telemetry -->
        <div id="hint" class="hidden"></div>
      </div>
    </div>
  </div>

  <!-- Centered modal overlays (built by dashboard.js): -->
  <div id="wizard" class="modal hidden"></div>      <!-- cold-start connection wizard -->
  <div id="settings" class="modal hidden"></div>   <!-- channel assignment -->
  <div id="labels" class="modal hidden"></div>      <!-- EN/DE labels (separate page) -->

  <script src="/dashboard.js"></script>
</body>
</html>
