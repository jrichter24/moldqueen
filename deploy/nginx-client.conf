# moldqueen client (static UI) — routes mirror the Pi's api.py (server-derived /<id>):
#   /          -> chooser.html      (layout chooser)
#   /excavator -> dashboard.html    (excavator layout, id "excavator")
#   /raw       -> raw.html          (RAW debug, id "raw")
# everything else (js/css/assets/asyncapi.yaml) is served as a plain static file.
# NOTE: this static mirror is hardcoded — a NEW layout needs a line here too (the Pi's
# api.py derives routes from the manifest automatically; nginx can't).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    location = /            { try_files /chooser.html =404; }
    location = /index.html  { try_files /chooser.html =404; }
    location = /excavator   { try_files /dashboard.html =404; }
    location = /raw         { try_files /raw.html =404; }

    # static assets (clientconfig.js, *.js, *.css, layouts.json, /assets/*, /asyncapi.yaml)
    location / { try_files $uri $uri/ =404; }
}
