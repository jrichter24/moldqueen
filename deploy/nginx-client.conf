# moldqueen client (static UI) — same routes as the Pi's api.py:
#   /          -> chooser.html      (layout chooser)
#   /dashboard -> dashboard.html    (excavator)
#   /raw       -> raw.html          (RAW debug)
# everything else (js/css/assets/asyncapi.yaml) is served as a plain static file.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    location = /            { try_files /chooser.html =404; }
    location = /index.html  { try_files /chooser.html =404; }
    location = /dashboard      { try_files /dashboard.html =404; }
    location = /dashboard.html { try_files /dashboard.html =404; }
    location = /raw            { try_files /raw.html =404; }
    location = /raw.html       { try_files /raw.html =404; }

    # static assets (clientconfig.js, *.js, *.css, /assets/*, /asyncapi.yaml)
    location / { try_files $uri $uri/ =404; }
}
