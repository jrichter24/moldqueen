<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>moldqueen — dashboard</title>
  <link rel="icon" href="/assets/moldqueen_icon.png" />
  <link rel="stylesheet" href="/shell.css" />       <!-- shared shell + menu + modal/wizard base -->
  <link rel="stylesheet" href="/dashboard.css" />   <!-- excavator-specific: stage/art/joysticks -->

  <script>
    // Injected by the serving host; stay valid when served raw (no injection): each is a
    // string (the port is parsed in clientconfig.js).
    window.MK4_WS_PORT = "__WS_PORT__";
    window.MK4_SHOW_FULLSCREEN = "__SHOW_FULLSCREEN__";   // "true" (web default) | "false" (native host)
  </script>
</head>
<body>
  <!-- Viewport-sized shell: a menu STRIP (top bar on wide screens, left sidebar on
       small ones) + a dashboard AREA. The stage scales to fit the area (contain),
       preserving the percent-coordinate control positioning. No page scrolling. -->
  <div id="app">
    <button id="navChip" type="button" aria-label="Show menu" title="Show menu">›</button>  <!-- expand chip; shown only while collapsed -->
    <div id="statusLight" class="statuslight red" title="No server"></div>  <!-- live status: red/yellow/green -->
    <nav id="menu"></nav>                     <!-- toolbar; built by dashboard.js -->
    <div id="stagewrap">
      <div id="stage">
        <img id="bg" src="/assets/moldqueen_dashboard_v3.png" alt="" draggable="false" />
        <div id="overlay"></div>              <!-- hotspots + joysticks + titles + telemetry -->
        <div id="hint" class="hidden"></div>
      </div>
    </div>
  </div>

  <!-- Centered modal overlays (built by dashboard.js): -->
  <div id="startup" class="modal hidden"></div>     <!-- startup guide: reach the API, then connect the excavator -->
  <div id="wizard" class="modal hidden"></div>      <!-- cold-start excavator connection wizard -->
  <div id="settings" class="modal hidden"></div>   <!-- tabbed settings: Connection · Channels · Labels · Server info -->

  <script src="/i18n.js"></script>          <!-- shared UI translations (MK4I18N); load FIRST so clientconfig can use it -->
  <script src="/clientconfig.js"></script>
  <script src="/dashboard.js"></script>
</body>
</html>
