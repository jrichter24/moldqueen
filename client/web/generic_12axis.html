<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>moldqueen — 12-axis controller</title>
  <link rel="icon" href="/assets/moldqueen_icon.png" />
  <link rel="stylesheet" href="/shell.css" />       <!-- shared shell + menu + modal/wizard base -->
  <link rel="stylesheet" href="/generic.css" />     <!-- generic engine: stage + control widgets -->
  <script>
    // Injected by the serving host; stay valid when served raw. This thin page just names the
    // layout id; the SHARED engine (generic.js) loads its spec + channel map by that id.
    window.MK4_WS_PORT = "__WS_PORT__";
    window.MK4_SHOW_FULLSCREEN = "__SHOW_FULLSCREEN__";
    window.MK4_LAYOUT_ID = "generic_12axis";
  </script>
</head>
<body>
  <!-- Viewport-sized shell: a menu STRIP (top bar / left sidebar) + a controller AREA. The
       stage contains-fits the controller art; transparent control overlays sit on top. -->
  <div id="app">
    <div id="statusLight" class="statuslight red" title="No server"></div>  <!-- live status: red/yellow/green -->
    <nav id="menu"></nav>                     <!-- toolbar; built by generic.js -->
    <div id="stagewrap">
      <div id="stage">
        <img id="bg" alt="" draggable="false" />   <!-- src set from the layout spec -->
        <div id="overlay"></div>              <!-- percent-positioned control widgets -->
      </div>
    </div>
  </div>

  <!-- Centered modal overlays (built by generic.js): -->
  <div id="wizard" class="modal hidden"></div>     <!-- cold-start connect lifecycle wizard -->
  <div id="assign" class="modal hidden"></div>     <!-- auto-assign wizard (controls -> channels) -->
  <div id="settings" class="modal hidden"></div>   <!-- lean channels editor + re-run auto-assign -->

  <script src="/i18n.js"></script>          <!-- shared UI translations (MK4I18N); load FIRST so clientconfig can use it -->
  <script src="/clientconfig.js"></script>
  <script src="/generic.js"></script>
</body>
</html>
